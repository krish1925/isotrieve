name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install ruff mypy
      - name: Ruff check
        run: ruff check isotrieve-python/src/ isotrieve-python/tests/
      - name: Ruff format check
        run: ruff format --check isotrieve-python/src/ isotrieve-python/tests/

  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package
        working-directory: isotrieve-python
        run: pip install -e ".[dev]"
      - name: Run tests
        working-directory: isotrieve-python
        run: python -m pytest tests/ -q --tb=short

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - name: Install package with types
        working-directory: isotrieve-python
        run: pip install -e ".[dev]" mypy
      - name: Mypy strict (core)
        working-directory: isotrieve-python
        run: mypy src/isotrieve/ --ignore-missing-imports
